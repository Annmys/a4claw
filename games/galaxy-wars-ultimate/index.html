<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galaxy Wars Ultimate</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        canvas { display: block; image-rendering: pixelated; }
        #loading {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at center, #0a0a2e 0%, #000 100%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 0.8s ease;
        }
        #loading.fade-out { opacity: 0; pointer-events: none; }
        .load-title {
            font-size: clamp(28px, 6vw, 56px); font-weight: 900; letter-spacing: 4px;
            background: linear-gradient(90deg, #0ff, #f0f, #ff0, #0ff);
            background-size: 300% 100%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: grad 2s ease infinite; margin-bottom: 8px;
        }
        .load-sub { color: #888; font-size: 14px; letter-spacing: 2px; margin-bottom: 30px; }
        @keyframes grad { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .bar-wrap { width: 240px; height: 4px; background: #222; border-radius: 2px; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #0ff, #f0f); border-radius: 2px; transition: width 0.3s; }
        .load-pct { color: #0ff; font-size: 13px; margin-top: 12px; font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>
    <div id="loading">
        <div class="load-title">GALAXY WARS</div>
        <div class="load-sub">ULTIMATE EDITION</div>
        <div class="bar-wrap"><div class="bar-fill" id="bar"></div></div>
        <div class="load-pct" id="pct">0%</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
