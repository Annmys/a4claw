<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEON WARFARE — ClawdAgent</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Courier New',monospace}
canvas{display:block;image-rendering:pixelated}
#loading{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999;transition:opacity 0.5s}
#loading.hidden{opacity:0;pointer-events:none}
#loading h1{font-size:clamp(28px,6vw,52px);font-weight:900;background:linear-gradient(90deg,#0ff,#f0f,#ff0,#0ff);background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:grad 2s ease infinite;margin-bottom:20px;text-align:center}
@keyframes grad{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
#loading .bar{width:200px;height:4px;background:#222;border-radius:2px;overflow:hidden}
#loading .bar-fill{height:100%;width:0%;background:linear-gradient(90deg,#0ff,#f0f);transition:width 0.3s;border-radius:2px}
#loading p{color:#0ff;margin-top:12px;font-size:14px}
</style>
</head>
<body>
<div id="loading">
<h1>NEON WARFARE</h1>
<div class="bar"><div class="bar-fill" id="bar-fill"></div></div>
<p id="load-text">Initializing...</p>
</div>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script src="game.js"></script>
</body>
</html>
