<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NOVA STRIKE — Epic Space Shooter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        canvas { display: block; image-rendering: pixelated; }
        #loading {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at center, #080820 0%, #000 100%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.8s ease;
        }
        #loading.hide { opacity: 0; pointer-events: none; }
        .logo {
            font-size: clamp(32px, 8vw, 64px);
            font-weight: 900; font-family: 'Arial Black', sans-serif;
            background: linear-gradient(135deg, #0ff 0%, #f0f 50%, #ff0 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shimmer 2s ease infinite;
            text-shadow: 0 0 60px rgba(0,255,255,0.4);
        }
        @keyframes shimmer { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
        .sub { color: #888; font-size: 14px; margin-top: 12px; font-family: monospace; }
        .bar-wrap { width: 200px; height: 4px; background: #222; border-radius: 2px; margin-top: 20px; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #0ff, #f0f); border-radius: 2px; transition: width 0.3s; }
    </style>
</head>
<body>
    <div id="loading">
        <div class="logo">NOVA STRIKE</div>
        <div class="sub">Initializing weapons systems...</div>
        <div class="bar-wrap"><div class="bar-fill" id="loadbar"></div></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
