<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEON VORTEX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Orbitron', 'Segoe UI', monospace;
        }
        canvas { display: block; image-rendering: pixelated; }
        #loading {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at center, #0a0020 0%, #000 70%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.5s;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        #loading h1 {
            font-size: 52px; font-weight: 900; letter-spacing: 8px;
            background: linear-gradient(90deg, #0ff, #f0f, #ff0, #0f0, #0ff);
            background-size: 400% 100%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: grad 2s ease infinite; margin-bottom: 30px;
            text-shadow: 0 0 40px rgba(0,255,255,0.5);
        }
        @keyframes grad { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
        .loader {
            width: 80px; height: 80px; position: relative;
        }
        .loader::before, .loader::after {
            content: ''; position: absolute; border-radius: 50%;
            top: 0; left: 0; right: 0; bottom: 0;
        }
        .loader::before {
            border: 3px solid transparent; border-top-color: #0ff; border-right-color: #f0f;
            animation: spin 1s linear infinite;
        }
        .loader::after {
            border: 3px solid transparent; border-bottom-color: #ff0; border-left-color: #0f0;
            margin: 8px; animation: spin 0.6s linear infinite reverse;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading p { color: #0ff; font-size: 16px; margin-top: 20px; letter-spacing: 3px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loading">
        <h1>NEON VORTEX</h1>
        <div class="loader"></div>
        <p>INITIALIZING SYSTEMS...</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
