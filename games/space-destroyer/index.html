<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Galaxy Destroyer — Epic Space Shooter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        canvas { display: block; image-rendering: pixelated; }
        #loading {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at center, #0a0020 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.5s;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .load-title {
            font-size: 48px; font-weight: bold; letter-spacing: 8px;
            background: linear-gradient(90deg, #0ff, #f0f, #ff0, #0f0, #0ff);
            background-size: 400% 100%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shimmer 2s ease infinite; margin-bottom: 30px;
        }
        @keyframes shimmer { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
        .load-bar-bg { width: 300px; height: 4px; background: #222; border-radius: 2px; overflow: hidden; }
        .load-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #0ff, #f0f); transition: width 0.3s; border-radius: 2px; }
        .load-text { color: #0ff; margin-top: 15px; font-size: 14px; opacity: 0.7; }
    </style>
</head>
<body>
    <div id="loading">
        <div class="load-title">GALAXY DESTROYER</div>
        <div class="load-bar-bg"><div class="load-bar" id="loadBar"></div></div>
        <div class="load-text">INITIALIZING WEAPONS SYSTEMS...</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
