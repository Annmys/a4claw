<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GALAXY ANNIHILATOR — ClawdAgent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        canvas { display: block; image-rendering: pixelated; }
        #loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at center, #0a0a2e 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .load-title {
            font-size: clamp(28px, 6vw, 52px);
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(90deg, #0ff, #f0f, #ff0, #0ff);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: grad 2s ease infinite;
            margin-bottom: 30px;
            text-align: center;
        }
        @keyframes grad { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .spinner-wrap { position: relative; width: 80px; height: 80px; margin: 20px; }
        .spinner-ring {
            position: absolute;
            border-radius: 50%;
            border: 3px solid transparent;
            animation: spin 1s linear infinite;
        }
        .spinner-ring:nth-child(1) {
            width: 80px; height: 80px; top: 0; left: 0;
            border-top-color: #0ff; border-right-color: #0ff;
        }
        .spinner-ring:nth-child(2) {
            width: 60px; height: 60px; top: 10px; left: 10px;
            border-bottom-color: #f0f; border-left-color: #f0f;
            animation-direction: reverse; animation-duration: 0.8s;
        }
        .spinner-ring:nth-child(3) {
            width: 40px; height: 40px; top: 20px; left: 20px;
            border-top-color: #ff0; border-right-color: #ff0;
            animation-duration: 0.6s;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .load-sub {
            color: #888;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 10px;
        }
        .load-sub span {
            color: #0ff;
            font-weight: bold;
        }
        /* Floating particles on loading */
        .load-particle {
            position: absolute;
            width: 3px; height: 3px;
            background: #0ff;
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0.5;
        }
        @keyframes float {
            from { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            to { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="load-title">GALAXY ANNIHILATOR</div>
        <div class="spinner-wrap">
            <div class="spinner-ring"></div>
            <div class="spinner-ring"></div>
            <div class="spinner-ring"></div>
        </div>
        <div class="load-sub">Built by <span>ClawdAgent</span></div>
    </div>
    <script>
        // Loading screen particles
        const ld = document.getElementById('loading');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'load-particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (3 + Math.random() * 5) + 's';
            p.style.animationDelay = Math.random() * 5 + 's';
            p.style.background = ['#0ff','#f0f','#ff0','#0f0'][Math.floor(Math.random()*4)];
            ld.appendChild(p);
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
