<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GALAXY DESTROYER - ClawdAgent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        canvas { display: block; image-rendering: pixelated; }
        #loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at center, #0a0a2e 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease-out;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .load-title {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(90deg, #0ff, #f0f, #ff0, #0ff);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: grad 2s ease infinite;
            margin-bottom: 20px;
        }
        @keyframes grad { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .load-sub { color: #888; font-size: 14px; margin-top: 15px; }
        .load-sub a { color: #0ff; text-decoration: none; }
        .spinner {
            width: 50px; height: 50px;
            border: 3px solid transparent;
            border-top: 3px solid #0ff;
            border-right: 3px solid #f0f;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading">
        <div class="load-title">GALAXY DESTROYER</div>
        <div class="spinner"></div>
        <div class="load-sub">Built by <a href="https://clawdagent.clickdrop.online" target="_blank">ClawdAgent</a></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
