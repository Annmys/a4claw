<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STELLAR FURY</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }
        canvas { display: block; image-rendering: auto; }
        #boot {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at 50% 40%, #0a0a2e 0%, #020210 60%, #000 100%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.6s ease-out;
        }
        #boot.gone { opacity: 0; pointer-events: none; }
        .boot-title {
            font-size: clamp(28px, 7vw, 56px);
            font-weight: 900; letter-spacing: 8px;
            background: linear-gradient(135deg, #0ff 0%, #f0f 50%, #ff0 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 2s ease-in-out infinite;
            text-shadow: 0 0 60px rgba(0,255,255,0.4);
            margin-bottom: 8px;
        }
        .boot-sub {
            color: rgba(0,255,255,0.5); font-size: 13px;
            letter-spacing: 4px; text-transform: uppercase;
            margin-bottom: 30px;
        }
        .bar-wrap {
            width: min(320px, 70vw); height: 4px;
            background: rgba(255,255,255,0.08); border-radius: 2px;
            overflow: hidden; margin-bottom: 12px;
        }
        .bar-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #0ff, #f0f);
            border-radius: 2px;
            transition: width 0.3s ease-out;
        }
        .bar-pct {
            color: rgba(0,255,255,0.4); font-size: 11px;
            font-variant-numeric: tabular-nums;
        }
        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
    </style>
</head>
<body>
    <div id="boot">
        <div class="boot-title">STELLAR FURY</div>
        <div class="boot-sub">ClawdAgent Engine</div>
        <div class="bar-wrap"><div class="bar-fill" id="bar"></div></div>
        <div class="bar-pct" id="pct">0%</div>
    </div>
    <script>
        function setProgress(p) {
            document.getElementById('bar').style.width = p + '%';
            document.getElementById('pct').textContent = Math.round(p) + '%';
        }
        setProgress(10);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js" onload="setProgress(40)"></script>
    <script src="game.js" onload="setProgress(100)"></script>
</body>
</html>
